<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GridX Core</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8f9fc;
      --surface: #fff;
      --ink: #1A1B35;
      --muted: #5b6280;
      --line: #1A1B35;
      --pastel-blue: #dcecff;
      --pastel-orange: #ffe8d6;
      --pastel-yellow: #fff4bf;
      --pastel-mint: #dbf7ec;
      --pastel-lav: #ece3ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Manrope', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      width: min(980px, 100% - 24px);
      margin: 0 auto;
      padding: 14px 0 30px;
    }

    .nav {
      position: sticky;
      top: 10px;
      z-index: 40;
      border: 3px solid var(--line);
      border-radius: 20px;
      background: #ffffffd6;
      backdrop-filter: blur(8px);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .brand {
      text-decoration: none;
      color: var(--ink);
      font-weight: 800;
      letter-spacing: -0.02em;
      font-size: 18px;
    }

    .back {
      text-decoration: none;
      border: 2px solid var(--line);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 800;
      color: var(--ink);
      background: #fff;
    }

    .shell {
      border: 3px solid var(--line);
      border-radius: 24px;
      background: linear-gradient(140deg, #fff 0%, #eef2ff 100%);
      padding: 18px;
      display: grid;
      gap: 16px;
    }

    .head {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 12px;
      align-items: center;
    }

    .icon {
      width: 90px;
      height: 90px;
      border-radius: 20px;
      border: 3px solid var(--line);
      background: #fff;
      object-fit: cover;
    }

    .title {
      font-size: clamp(24px, 6vw, 36px);
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }

    .desc {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 2px solid var(--line);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .06em;
      background: #fff;
    }

    .chip.c1 { background: var(--pastel-blue); }
    .chip.c2 { background: var(--pastel-mint); }
    .chip.c3 { background: var(--pastel-lav); }

    .cta-wrap {
      border: 3px solid var(--line);
      background: #fff;
      border-radius: 18px;
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .download-btn {
      height: 54px;
      border: 3px solid var(--line);
      border-radius: 999px;
      background: var(--pastel-yellow);
      color: var(--ink);
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    .download-btn:disabled { opacity: .5; cursor: not-allowed; }

    .hint {
      border: 2px solid var(--line);
      border-radius: 14px;
      padding: 10px 12px;
      background: var(--pastel-orange);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.45;
    }

    .status {
      border: 3px dashed var(--line);
      border-radius: 16px;
      background: #fff;
      padding: 22px 14px;
      text-align: center;
      color: var(--muted);
      font-weight: 600;
    }

    .skeleton {
      height: 14px;
      border-radius: 7px;
      background: #e4e8f8;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }

    footer {
      text-align: center;
      font-size: 11px;
      color: #6f7690;
      font-weight: 700;
      margin-top: 16px;
    }

    @media (min-width: 860px) {
      .shell { padding: 24px; }
      .head { grid-template-columns: 120px 1fr; gap: 18px; }
      .icon { width: 120px; height: 120px; border-radius: 24px; }
      .cta-wrap { max-width: 560px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="nav">
      <a class="brand" id="brandLink" href="index.html">GridX Core</a>
      <a class="back" href="index.html">← Back</a>
    </header>

    <div id="loading" class="status">
      <div class="skeleton" style="width:72%;margin:0 auto 10px;"></div>
      <div class="skeleton" style="width:56%;margin:0 auto 10px;"></div>
      <div class="skeleton" style="width:36%;margin:0 auto;"></div>
    </div>

    <main id="content" class="shell" style="display:none;">
      <section class="head">
        <img id="app-icon" class="icon" alt="App icon" />
        <div>
          <h1 id="app-name" class="title"></h1>
          <p id="app-desc" class="desc"></p>
        </div>
      </section>

      <section id="feature-chips" class="chips"></section>

      <section class="cta-wrap">
        <button id="download-btn" class="download-btn">Step 1: Open Smart Link</button>
        <div id="smartlink-hint" class="hint">Tap once for smart link. Come back and tap again for direct download.</div>
      </section>
    </main>

    <footer id="copyright">© 2026 GridX Core</footer>
  </div>

  <script src="./config.js"></script>
  <script>
    const SHEET_ID = window.APP_CONFIG?.SHEET_ID || "";
    const BRAND = window.APP_CONFIG?.BRAND || "GridX Core";
    const COPYRIGHT = window.APP_CONFIG?.COPYRIGHT || "© 2026 GridX Core";
    const GLOBAL_SMART_LINK = "https://www.profitablecpmratenetwork.com/th4iq4cz?key=da8ba8716ee7c214e9decd3ec3f0f3dd";

    const CATEGORY_ICON_MAP = {
      Games: "https://i.ibb.co.com/wZSSNgXp/controller.jpg",
      Apps: "https://i.ibb.co.com/zt2T8F3/apk.jpg",
      Tools: "https://i.ibb.co.com/8L0MLqq7/strategy-game.jpg",
      Wallpaper: "https://i.ibb.co.com/sJRDjTqr/images-2.png",
      Video: "https://i.ibb.co.com/BHQn6pCj/play.jpg"
    };

    document.getElementById("brandLink").textContent = BRAND;
    document.getElementById("copyright").textContent = COPYRIGHT;

    let clickedOnce = false;
    let appDownloadUrl = "";

    function getAppId() {
      return parseInt(new URLSearchParams(window.location.search).get("id")) || 1;
    }

    function normalize(cell, fallback = "") {
      if (!cell) return fallback;
      if (cell.f != null) return String(cell.f);
      if (cell.v != null) return String(cell.v);
      return fallback;
    }

    function escapeHtml(str = "") {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function parseGvizJson(text) {
      const match = text.match(/google\.visualization\.Query\.setResponse\((.*)\);?\s*$/s);
      if (match && match[1]) return JSON.parse(match[1]);
      return JSON.parse(text.substring(47).slice(0, -2));
    }

    function canonicalCategory(raw, strict = false) {
      const v = String(raw || "").trim().toLowerCase();
      if (!v) return strict ? "" : "Apps";
      if (["game", "games", "gaming", "action games"].includes(v)) return "Games";
      if (["app", "apps", "application", "applications", "apk", "apks"].includes(v)) return "Apps";
      if (["tool", "tools", "utility", "utilities", "emulator", "emulators"].includes(v)) return "Tools";
      if (["wallpaper", "wallpapers", "theme", "themes"].includes(v)) return "Wallpaper";
      if (["video", "videos", "movie", "movies", "media"].includes(v)) return "Video";
      return strict ? "" : "Apps";
    }

    function inferCategory(rawCategory, features = "") {
      const fromCategory = canonicalCategory(rawCategory, true);
      if (fromCategory) return fromCategory;

      const fromFeature = String(features)
        .split(",")
        .map(v => canonicalCategory(v.trim(), true))
        .find(Boolean);

      return fromFeature || "Apps";
    }

    function getCategoryIcon(category) {
      return CATEGORY_ICON_MAP[category] || CATEGORY_ICON_MAP.Apps;
    }

    function isLikelyImageUrl(url = "") {
      return /\.(png|jpe?g|webp|gif|svg|avif)(\?|#|$)/i.test(String(url).trim());
    }

    async function fetchApp(id) {
      if (!SHEET_ID || SHEET_ID === "PASTE_YOUR_SHEET_ID_HERE") {
        throw new Error("Sheet ID missing in config.js");
      }

      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
      const res = await fetch(url);
      const text = await res.text();
      const json = parseGvizJson(text);
      const row = json.table.rows[id - 1];

      if (!row) return null;

      const cols = json.table.cols || [];
      const colMap = {};
      cols.forEach((c, i) => {
        const k = String(c?.label || c?.id || "").trim().toLowerCase();
        if (k) colMap[k] = i;
      });

      const getIdx = (...keys) => {
        for (const key of keys) {
          const k = String(key).toLowerCase();
          if (Object.prototype.hasOwnProperty.call(colMap, k)) return colMap[k];
        }
        return -1;
      };

      const IDX = {
        name: getIdx("name"),
        description: getIdx("description"),
        icon: getIdx("icon"),
        version: getIdx("version"),
        platform: getIdx("platform"),
        downloadUrl: getIdx("downloadurl", "download url", "download"),
        features: getIdx("features"),
        category: getIdx("category")
      };

      const read = (idx, fallback = "") => idx >= 0 ? normalize(row.c[idx], fallback) : fallback;

      const features = read(IDX.features, "");
      const categoryRaw = read(IDX.category, "");
      const category = inferCategory(categoryRaw, features);
      const rawIcon = read(IDX.icon, "");
      const safeIcon = isLikelyImageUrl(rawIcon) ? rawIcon : "";

      return {
        name: read(IDX.name, "App"),
        description: read(IDX.description, ""),
        icon: safeIcon,
        version: read(IDX.version, ""),
        platform: read(IDX.platform, ""),
        downloadUrl: read(IDX.downloadUrl, ""),
        features,
        category,
        categoryIcon: getCategoryIcon(category)
      };
    }

    function handleDownloadClick() {
      const btn = document.getElementById("download-btn");
      const hint = document.getElementById("smartlink-hint");

      if (!clickedOnce) {
        clickedOnce = true;
        window.open(GLOBAL_SMART_LINK, "_blank", "noopener,noreferrer");
        btn.textContent = "Step 2: Tap for Direct Download";
        hint.textContent = "Step 1 done. Press Back, return here, then tap again for direct download.";
      } else {
        clickedOnce = false;
        if (appDownloadUrl && appDownloadUrl.trim()) {
          window.open(appDownloadUrl, "_blank", "noopener,noreferrer");
        }
        btn.textContent = "Step 1: Open Smart Link";
        hint.textContent = "Tap once for smart link. Come back and tap again for direct download.";
      }
    }

    function populatePage(app) {
      document.title = `${app.name} - ${BRAND}`;
      document.getElementById("app-name").textContent = app.name;
      document.getElementById("app-desc").textContent = app.description || "No description available.";

      const iconEl = document.getElementById("app-icon");
      iconEl.onerror = () => {
        if (app.categoryIcon && iconEl.src !== app.categoryIcon) {
          iconEl.src = app.categoryIcon;
        }
      };
      iconEl.src = app.icon || app.categoryIcon;

      appDownloadUrl = app.downloadUrl || "";

      const chips = [];
      if (app.category) chips.push(`<span class="chip c1">${escapeHtml(app.category)}</span>`);
      if (app.version) chips.push(`<span class="chip c2">v${escapeHtml(app.version)}</span>`);
      if (app.platform) chips.push(`<span class="chip c3">${escapeHtml(app.platform)}</span>`);
      if (app.features) {
        app.features.split(",").map(v => v.trim()).filter(Boolean).slice(0, 4).forEach(ft => {
          chips.push(`<span class="chip">${escapeHtml(ft)}</span>`);
        });
      }
      document.getElementById("feature-chips").innerHTML = chips.join("");

      const btn = document.getElementById("download-btn");
      if (!appDownloadUrl) {
        btn.disabled = true;
        btn.textContent = "Download Link Coming Soon";
      }

      document.getElementById("loading").style.display = "none";
      document.getElementById("content").style.display = "grid";
    }

    function showError(message = "Something went wrong. Please try again later.") {
      document.getElementById("loading").innerHTML = `<div>${message}</div>`;
    }

    window.addEventListener("DOMContentLoaded", async () => {
      try {
        const app = await fetchApp(getAppId());
        if (!app) {
          showError("Invalid app ID. Please check your URL.");
          return;
        }
        populatePage(app);
      } catch (err) {
        console.error(err);
        showError("Error loading app data. Check your Sheet settings.");
      }

      document.getElementById("download-btn").addEventListener("click", handleDownloadClick);
    });
  </script>
</body>
</html>
