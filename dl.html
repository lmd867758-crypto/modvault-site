<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GridX Core</title>
  <meta name="theme-color" content="#1A1B35" />
  <link rel="icon" type="image/png" href="https://i.ibb.co.com/TqrSkrdD/Gemini-Generated-Image-bje8lbbje8lbbje8-removebg-preview.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f6fa;
      --surface: #fff;
      --ink: #1A1B35;
      --muted: #5f6686;
      --line: #1A1B35;
      --pastel-blue: #dcecff;
      --muted-orange: #ffe3cf;
      --pale-yellow: #fff4bf;
      --mint-green: #dbf7ec;
      --lavender: #ece3ff;
      --radius-xl: 26px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --shadow-soft: 0 14px 35px rgba(26, 27, 53, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Manrope', sans-serif;
      background:
        radial-gradient(circle at 0% 0%, #eef1ff 0%, transparent 36%),
        radial-gradient(circle at 100% 0%, #fff4bf70 0%, transparent 35%),
        linear-gradient(180deg, #fafbff 0%, var(--bg) 100%);
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      width: min(980px, calc(100% - 24px));
      margin: 0 auto;
      padding: 12px 0 30px;
    }

    .nav {
      position: sticky;
      top: 8px;
      z-index: 30;
      border: 3px solid var(--line);
      border-radius: var(--radius-lg);
      background: #ffffffd8;
      backdrop-filter: blur(8px);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 14px;
      box-shadow: var(--shadow-soft);
    }

    .brand {
      text-decoration: none;
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
    }

    .brand-logo {
      width: 36px;
      height: 36px;
      border-radius: 11px;
      border: 3px solid var(--line);
      object-fit: contain;
      background: #fff;
      padding: 2px;
      flex-shrink: 0;
    }

    .brand-name {
      font-weight: 800;
      letter-spacing: -0.02em;
      font-size: 17px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 44vw;
    }

    .back {
      text-decoration: none;
      border: 2px solid var(--line);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 800;
      color: var(--ink);
      background: #fff;
      white-space: nowrap;
    }

    .shell {
      border: 3px solid var(--line);
      border-radius: var(--radius-xl);
      background: linear-gradient(138deg, #fff 0%, #edf1ff 74%, #fff 100%);
      padding: 16px;
      display: grid;
      gap: 14px;
      box-shadow: var(--shadow-soft);
    }

    .head {
      display: grid;
      grid-template-columns: 86px 1fr;
      gap: 12px;
      align-items: center;
    }

    .icon {
      width: 86px;
      height: 86px;
      border-radius: 20px;
      border: 3px solid var(--line);
      background: #fff;
      object-fit: cover;
    }

    .title {
      font-size: clamp(24px, 6vw, 38px);
      line-height: 1.03;
      letter-spacing: -0.03em;
      margin-bottom: 7px;
    }

    .desc {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.58;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 2px solid var(--line);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .06em;
      background: #fff;
    }

    .chip.c1 { background: var(--pastel-blue); }
    .chip.c2 { background: var(--mint-green); }
    .chip.c3 { background: var(--lavender); }

    .cta-wrap {
      border: 3px solid var(--line);
      border-radius: 18px;
      background: #fff;
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      min-height: 52px;
      border: 3px solid var(--line);
      border-radius: 999px;
      background: var(--pale-yellow);
      color: var(--ink);
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: transform .15s ease;
    }

    .download-btn:hover { transform: translateY(-2px); }
    .download-btn[aria-disabled="true"] {
      pointer-events: none;
      opacity: .58;
      background: #f1f2f9;
    }

    .hint {
      border: 2px solid var(--line);
      border-radius: 14px;
      padding: 10px 12px;
      background: var(--muted-orange);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.45;
      color: #3f4767;
    }

    .feature-block {
      border: 3px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      background: var(--surface);
      display: grid;
      gap: 8px;
    }

    .feature-title {
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
    }

    .feature-list {
      list-style: none;
      display: grid;
      gap: 8px;
    }

    .feature-list li {
      border: 2px solid var(--line);
      border-radius: 12px;
      padding: 9px 10px;
      background: #fff;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.4;
    }

    .status {
      border: 3px dashed var(--line);
      border-radius: 16px;
      background: #fff;
      padding: 22px 14px;
      text-align: center;
      color: var(--muted);
      font-weight: 700;
    }

    .skeleton {
      height: 14px;
      border-radius: 7px;
      background: #e4e8f8;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }

    footer {
      text-align: center;
      font-size: 11px;
      color: #707795;
      font-weight: 700;
      margin-top: 16px;
    }

    @media (min-width: 860px) {
      .shell { padding: 24px; }
      .head { grid-template-columns: 118px 1fr; gap: 18px; }
      .icon { width: 118px; height: 118px; border-radius: 24px; }
      .cta-wrap { max-width: 560px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="nav">
      <a class="brand" id="brandLink" href="index.html">
        <img class="brand-logo" src="https://i.ibb.co.com/TqrSkrdD/Gemini-Generated-Image-bje8lbbje8lbbje8-removebg-preview.png" alt="GridX Core logo" />
        <span class="brand-name">GridX Core</span>
      </a>
      <a class="back" href="index.html">← Back</a>
    </header>

    <div id="loading" class="status">
      <div class="skeleton" style="width:72%;margin:0 auto 10px;"></div>
      <div class="skeleton" style="width:56%;margin:0 auto 10px;"></div>
      <div class="skeleton" style="width:36%;margin:0 auto;"></div>
    </div>

    <main id="content" class="shell" style="display:none;">
      <section class="head">
        <img id="app-icon" class="icon" alt="App icon" />
        <div>
          <h1 id="app-name" class="title"></h1>
          <p id="app-desc" class="desc"></p>
        </div>
      </section>

      <section id="feature-chips" class="chips"></section>

      <section class="cta-wrap">
        <a id="download-btn" class="download-btn" target="_blank" rel="noopener noreferrer">Download Now</a>
        <div id="download-hint" class="hint">Use the official direct download link from our live data sheet.</div>
      </section>

      <section class="feature-block">
        <div class="feature-title">Highlights</div>
        <ul id="feature-list" class="feature-list"></ul>
      </section>
    </main>

    <footer id="copyright">© 2026 GridX Core</footer>
  </div>

  <script src="./config.js"></script>
  <script>
    const SHEET_ID = window.APP_CONFIG?.SHEET_ID || "";
    const SHEET_TAB = window.APP_CONFIG?.SHEET_TAB || "পত্রক1";
    const BRAND = window.APP_CONFIG?.BRAND || "GridX Core";
    const COPYRIGHT = window.APP_CONFIG?.COPYRIGHT || "© 2026 GridX Core";

    document.querySelector('.brand-name').textContent = BRAND;
    document.getElementById('copyright').textContent = COPYRIGHT;

    function getAppId() {
      return parseInt(new URLSearchParams(window.location.search).get("id"), 10) || 1;
    }

    function normalize(cell, fallback = "") {
      if (!cell) return fallback;
      if (cell.f != null) return String(cell.f);
      if (cell.v != null) return String(cell.v);
      return fallback;
    }

    function escapeHtml(str = "") {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function parseGvizJson(text) {
      const match = text.match(/google\.visualization\.Query\.setResponse\((.*)\);?\s*$/s);
      if (match && match[1]) return JSON.parse(match[1]);
      return JSON.parse(text.substring(47).slice(0, -2));
    }

    function isLikelyImageUrl(url = "") {
      return /\.(png|jpe?g|webp|gif|svg|avif)(\?|#|$)/i.test(String(url).trim());
    }

    function mapCategory(rawCategory = "", features = "", name = "", description = "") {
      const text = `${rawCategory} ${features} ${name} ${description}`.toLowerCase();
      if (/emulator|ppsspp|psp|ps2|retro|nintendo|dolphin|bios/.test(text)) return "Emulators";
      if (/media|video|movie|stream|music|player|ott|youtube|netflix|audio/.test(text)) return "Media";
      if (/action|game|fps|battle|racing|pvp|shooter|adventure|arcade/.test(text)) return "Action Games";
      return "APKs";
    }

    function buildFallbackIcon(label = "A", category = "APKs") {
      const bg =
        category === "Action Games" ? "#dcecff" :
        category === "Emulators" ? "#ffe3cf" :
        category === "Media" ? "#dbf7ec" : "#ece3ff";

      const safeLabel = String(label || "A").charAt(0).toUpperCase();
      const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'>
        <rect width='100%' height='100%' rx='30' fill='${bg}'/>
        <rect x='24' y='24' width='172' height='172' rx='30' fill='white' stroke='#1A1B35' stroke-width='10'/>
        <text x='50%' y='56%' text-anchor='middle' font-family='Manrope,Arial' font-size='88' font-weight='800' fill='#1A1B35'>${safeLabel}</text>
      </svg>`;
      return `data:image/svg+xml;utf8,${encodeURIComponent(svg)}`;
    }

    async function fetchApp(id) {
      if (!SHEET_ID) throw new Error("Sheet ID missing in config.js");

      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(SHEET_TAB)}&tqx=out:json`;
      const res = await fetch(url);
      const text = await res.text();
      const json = parseGvizJson(text);
      const rows = json.table.rows || [];
      const row = rows[id - 1];

      if (!row) return null;

      const cols = json.table.cols || [];
      const colMap = {};
      cols.forEach((c, i) => {
        const k = String(c?.label || c?.id || "").trim().toLowerCase();
        if (k) colMap[k] = i;
      });

      const getIdx = (...keys) => {
        for (const key of keys) {
          const k = String(key).toLowerCase();
          if (Object.prototype.hasOwnProperty.call(colMap, k)) return colMap[k];
        }
        return -1;
      };

      const IDX = {
        name: getIdx("name"),
        description: getIdx("description"),
        icon: getIdx("icon"),
        version: getIdx("version"),
        platform: getIdx("platform"),
        downloadUrl: getIdx("downloadurl", "download url", "download"),
        features: getIdx("features"),
        category: getIdx("category")
      };

      const read = (idx, fallback = "") => idx >= 0 ? normalize(row.c?.[idx], fallback) : fallback;

      const name = read(IDX.name, "App").trim();
      const description = read(IDX.description, "").trim();
      const features = read(IDX.features, "").trim();
      const category = mapCategory(read(IDX.category, ""), features, name, description);
      const rawIcon = read(IDX.icon, "").trim();
      const safeIcon = isLikelyImageUrl(rawIcon) ? rawIcon : "";

      return {
        id,
        name,
        description,
        icon: safeIcon,
        version: read(IDX.version, "").trim(),
        platform: read(IDX.platform, "").trim(),
        downloadUrl: read(IDX.downloadUrl, "").trim(),
        features,
        category
      };
    }

    function populatePage(app) {
      document.title = `${app.name} - ${BRAND}`;
      document.getElementById("app-name").textContent = app.name;
      document.getElementById("app-desc").textContent = app.description || "No description available.";

      const iconEl = document.getElementById("app-icon");
      const fallbackIcon = buildFallbackIcon(app.name, app.category);
      iconEl.onerror = () => {
        if (iconEl.src !== fallbackIcon) iconEl.src = fallbackIcon;
      };
      iconEl.src = app.icon || fallbackIcon;

      const chips = [];
      if (app.category) chips.push(`<span class="chip c1">${escapeHtml(app.category)}</span>`);
      if (app.version) chips.push(`<span class="chip c2">v${escapeHtml(app.version)}</span>`);
      if (app.platform) chips.push(`<span class="chip c3">${escapeHtml(app.platform)}</span>`);
      document.getElementById("feature-chips").innerHTML = chips.join("");

      const featureItems = app.features
        ? app.features.split(",").map(v => v.trim()).filter(Boolean)
        : [];

      const featureList = document.getElementById("feature-list");
      if (featureItems.length) {
        featureList.innerHTML = featureItems.map(ft => `<li>${escapeHtml(ft)}</li>`).join("");
      } else {
        featureList.innerHTML = `<li>Stable build for smooth day-to-day usage.</li>`;
      }

      const btn = document.getElementById("download-btn");
      const hint = document.getElementById("download-hint");
      if (app.downloadUrl) {
        btn.href = app.downloadUrl;
        btn.setAttribute("aria-disabled", "false");
        hint.textContent = "Direct download link is loaded from Google Sheet data source.";
      } else {
        btn.removeAttribute("href");
        btn.setAttribute("aria-disabled", "true");
        btn.textContent = "Download Link Coming Soon";
        hint.textContent = "No direct download URL found in the current sheet row.";
      }

      document.getElementById("loading").style.display = "none";
      document.getElementById("content").style.display = "grid";
    }

    function showError(message = "Something went wrong. Please try again later.") {
      document.getElementById("loading").innerHTML = `<div>${message}</div>`;
    }

    window.addEventListener("DOMContentLoaded", async () => {
      try {
        const app = await fetchApp(getAppId());
        if (!app) {
          showError("Invalid app ID. Please check your URL.");
          return;
        }
        populatePage(app);
      } catch (err) {
        console.error(err);
        showError("Error loading app data. Check your Sheet settings and visibility.");
      }
    });
  </script>
</body>
</html>
