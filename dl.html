  <script>
    const SHEET_ID = window.APP_CONFIG?.SHEET_ID || "";
    const BRAND = window.APP_CONFIG?.BRAND || "ModVault";
    const COPYRIGHT = window.APP_CONFIG?.COPYRIGHT || "© 2026 ModVault";
    const GLOBAL_SMART_LINK = "https://www.profitablecpmratenetwork.com/th4iq4cz?key=da8ba8716ee7c214e9decd3ec3f0f3dd";

    document.getElementById("brandName").textContent = BRAND;
    document.getElementById("copyright").textContent = COPYRIGHT;

    let clickedOnce = false;
    let appDownloadUrl = "";
    let appSmartLink = "";

    function getAppId() {
      return parseInt(new URLSearchParams(window.location.search).get("id")) || 1;
    }

    function normalize(cell, fallback = "") {
      if (!cell) return fallback;
      if (cell.f != null) return String(cell.f);
      if (cell.v != null) return String(cell.v);
      return fallback;
    }

    async function fetchApp(id) {
      if (!SHEET_ID || SHEET_ID === "PASTE_YOUR_SHEET_ID_HERE") {
        throw new Error("Sheet ID missing in config.js");
      }

      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
      const res = await fetch(url);
      const text = await res.text();
      const json = JSON.parse(text.substring(47).slice(0, -2));
      const row = json.table.rows[id - 1];

      if (!row) return null;

      return {
        name: normalize(row.c[0], "App"),
        description: normalize(row.c[1], ""),
        icon: normalize(row.c[2], ""),
        version: normalize(row.c[3], ""),
        platform: normalize(row.c[4], ""),
        downloadUrl: normalize(row.c[5], ""),
        smartLink: normalize(row.c[6], ""),
        features: normalize(row.c[7], "")
      };
    }

    function handleDownloadClick() {
      const hasSmartLink = appSmartLink && appSmartLink.trim() !== "";
      const hasDownload = appDownloadUrl && appDownloadUrl.trim() !== "";

      if (!hasSmartLink) {
        if (hasDownload) window.open(appDownloadUrl, "_blank", "noopener,noreferrer");
        return;
      }

      if (!clickedOnce) {
        clickedOnce = true;
        window.open(appSmartLink, "_blank", "noopener,noreferrer");
        document.getElementById("btn-text").textContent = "Tap Again to Download";
        document.getElementById("smartlink-hint").style.display = "flex";
      } else {
        clickedOnce = false;
        if (hasDownload) window.open(appDownloadUrl, "_blank", "noopener,noreferrer");
        document.getElementById("btn-text").textContent = "Download Now";
        document.getElementById("smartlink-hint").style.display = "none";
      }
    }

    function populatePage(app) {
      document.title = `${app.name} - ${BRAND}`;

      const iconEl = document.getElementById("app-icon");
      iconEl.innerHTML = app.icon
        ? `<img src="${app.icon}" alt="${app.name}" onerror="this.style.display='none'"/>`
        : `<span class="material-symbols-outlined" style="font-size:48px;color:#636565">android</span>`;

      document.getElementById("app-name").textContent = app.name;
      document.getElementById("app-desc").textContent = app.description;

      const parts = [];
      if (app.version) parts.push("v" + app.version);
      if (app.platform) parts.push(app.platform);
      document.getElementById("app-meta").textContent = parts.join(" · ");

      appDownloadUrl = app.downloadUrl || "";
      appSmartLink = app.smartLink || "";

      if (!appDownloadUrl && !appSmartLink) {
        document.getElementById("download-btn").classList.add("disabled");
        document.getElementById("btn-text").textContent = "Coming Soon";
      }

      if (app.features) {
        const chips = app.features.split(",").map(f => f.trim()).filter(Boolean);
        document.getElementById("feature-chips").innerHTML = chips.map(f => `<span class="chip">${f}</span>`).join("");
      }

      document.getElementById("smartlink-hint").style.display = "none";
      document.getElementById("loading").style.display = "none";
      document.getElementById("content").style.display = "flex";
    }

    function showError(message = "Something went wrong. Please try again later.") {
      document.getElementById("loading").innerHTML = `
        <div style="text-align:center;padding:48px 16px;color:#8e9192;">
          <span class="material-symbols-outlined" style="font-size:44px;color:#444748;display:block;margin-bottom:12px;">wifi_off</span>
          <p style="font-size:14px;">${message}</p>
          <a href="index.html" style="display:inline-block;margin-top:16px;background:#fff;color:#141313;border-radius:999px;padding:8px 20px;font-size:13px;font-weight:600;text-decoration:none;">← Go Back</a>
        </div>`;
    }

    window.addEventListener("DOMContentLoaded", async () => {
      try {
        const app = await fetchApp(getAppId());
        if (!app) {
          showError("Invalid app ID. Please check your URL.");
          return;
        }
        populatePage(app);
      } catch (err) {
        console.error(err);
        showError("Error loading data. Check your Sheet ID in config.js");
      }
