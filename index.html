<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ModVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Manrope', sans-serif;
      background: #141313;
      color: #e5e2e1;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .nav-inner {
      max-width: 860px;
      margin: 0 auto;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .brand { color: #fff; font-weight: 700; letter-spacing: -0.02em; font-size: 18px; }
    .muted { color: #8e9192; font-size: 13px; }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 16px 16px 36px;
    }

    .hero {
      margin-bottom: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .hero h1 { font-size: clamp(22px, 4vw, 30px); color: #fff; letter-spacing: -0.03em; }
    .hero p { color: #9ca1a3; font-size: 13px; line-height: 1.6; }

    .search-wrap { margin: 12px 0 14px; }
    .search {
      width: 100%;
      background: #201f1f;
      border: 1px solid rgba(255,255,255,0.1);
      color: #e5e2e1;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      outline: none;
    }
    .search:focus { border-color: rgba(255,255,255,0.24); }

    .category-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 2px 8px;
      scroll-snap-type: x proximity;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      margin-bottom: 14px;
    }
    .category-strip::-webkit-scrollbar { height: 6px; }
    .category-strip::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2);
      border-radius: 999px;
    }

    .cat-btn {
      border: 1px solid rgba(255,255,255,0.1);
      background: #201f1f;
      color: #c9cccd;
      font-size: 12px;
      font-weight: 700;
      border-radius: 999px;
      padding: 6px 12px 6px 6px;
      white-space: nowrap;
      cursor: pointer;
      scroll-snap-align: start;
      transition: all .2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .cat-thumb {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,0.18);
      background: #2a2a2a;
      display: block;
      flex-shrink: 0;
    }
    .cat-label { line-height: 1; }
    .cat-btn.active {
      background: #fff;
      color: #111;
      border-color: #fff;
    }
    .cat-btn.active .cat-thumb {
      border-color: rgba(17,17,17,0.2);
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 6px 2px 12px;
    }
    .section-head h2 {
      font-size: 16px;
      color: #fff;
      letter-spacing: -0.01em;
    }
    .section-head .count {
      color: #85898b;
      font-size: 12px;
    }

    .app-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .app-row {
      display: grid;
      grid-template-columns: 56px 1fr auto;
      gap: 12px;
      align-items: center;
      text-decoration: none;
      color: inherit;
      background: #1a1919;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 10px;
      transition: transform .16s ease, border-color .2s ease;
    }
    .app-row:hover {
      transform: translateY(-1px);
      border-color: rgba(255,255,255,0.2);
    }

    .mini-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      object-fit: cover;
      background: #242323;
      border: 1px solid rgba(255,255,255,0.08);
      display: block;
      flex-shrink: 0;
    }

    .app-copy {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .title {
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .desc {
      color: #9aa0a2;
      font-size: 12px;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .meta {
      color: #727778;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .go {
      color: #7c8182;
      font-size: 22px;
      line-height: 1;
      padding: 0 2px;
    }

    .status {
      text-align: center;
      color: #8e9192;
      font-size: 14px;
      padding: 28px 12px;
      border: 1px dashed rgba(255,255,255,0.12);
      border-radius: 14px;
      background: #191818;
    }

    footer {
      border-top: 1px solid rgba(255,255,255,0.06);
      margin-top: 28px;
      padding: 18px 12px;
      text-align: center;
      color: #5b5f61;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <div class="brand" id="brand">ModVault</div>
      <div class="muted">Mod APK Library</div>
    </div>
  </nav>

  <main>
    <section class="hero">
      <h1>Find apps by category</h1>
      <p>Play Store style mini-icon list with swipe categories at the top.</p>
    </section>

    <div class="search-wrap">
      <input id="search" class="search" placeholder="Search app name..." />
    </div>

    <div id="category-strip" class="category-strip" style="display:none"></div>

    <div id="status" class="status">Loading apps...</div>

    <section id="result-wrap" style="display:none;">
      <div class="section-head">
        <h2 id="section-title">All Apps</h2>
        <span id="result-count" class="count">0 apps</span>
      </div>
      <div id="app-list" class="app-list"></div>
    </section>
  </main>

  <footer id="copyright">© 2026 ModVault</footer>

  <script src="./config.js"></script>
  <script>
    const BRAND = window.APP_CONFIG?.BRAND || "ModVault";
    const SHEET_ID = window.APP_CONFIG?.SHEET_ID || "";
    const COPYRIGHT = window.APP_CONFIG?.COPYRIGHT || "© 2026 ModVault";

    const CATEGORY_ICON_MAP = {
      Games: "https://i.ibb.co.com/wZSSNgXp/controller.jpg",
      Apps: "https://i.ibb.co.com/zt2T8F3/apk.jpg",
      Tools: "https://i.ibb.co.com/8L0MLqq7/strategy-game.jpg",
      Wallpaper: "https://i.ibb.co.com/sJRDjTqr/images-2.png",
      Video: "https://i.ibb.co.com/BHQn6pCj/play.jpg"
    };

    const CATEGORY_ORDER = ["All", "Games", "Apps", "Tools", "Wallpaper", "Video"];

    document.getElementById("brand").textContent = BRAND;
    document.getElementById("copyright").textContent = COPYRIGHT;
    document.title = BRAND;

    let apps = [];
    let activeCategory = "All";

    function parseGvizJson(text) {
      return JSON.parse(text.substring(47).slice(0, -2));
    }

    function normalize(cell, fallback = "") {
      if (!cell) return fallback;
      if (cell.f != null) return String(cell.f);
      if (cell.v != null) return String(cell.v);
      return fallback;
    }

    function escapeHtml(str = "") {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function canonicalCategory(raw, strict = false) {
      const v = String(raw || "").trim().toLowerCase();
      if (!v) return strict ? "" : "Apps";

      if (["game", "games", "gaming"].includes(v)) return "Games";
      if (["app", "apps", "application", "applications"].includes(v)) return "Apps";
      if (["tool", "tools", "utility", "utilities"].includes(v)) return "Tools";
      if (["wallpaper", "wallpapers", "theme", "themes"].includes(v)) return "Wallpaper";
      if (["video", "videos", "movie", "movies"].includes(v)) return "Video";

      return strict ? "" : "Apps";
    }

    function inferCategory(rawCategory, features = "") {
      const fromCategory = canonicalCategory(rawCategory, true);
      if (fromCategory) return fromCategory;

      const fromFeature = String(features)
        .split(",")
        .map(v => canonicalCategory(v.trim(), true))
        .find(Boolean);
      if (fromFeature) return fromFeature;

      return "Apps";
    }

    function getCategoryIcon(category) {
      return CATEGORY_ICON_MAP[category] || CATEGORY_ICON_MAP.Apps;
    }

    function isLikelyImageUrl(url = "") {
      return /\.(png|jpe?g|webp|gif|svg|avif)(\?|#|$)/i.test(String(url).trim());
    }

    async function fetchApps() {
      if (!SHEET_ID || SHEET_ID === "PASTE_YOUR_SHEET_ID_HERE") {
        throw new Error("Sheet ID missing in config.js");
      }

      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
      const res = await fetch(url);
      const text = await res.text();
      const json = parseGvizJson(text);

      return (json.table.rows || []).map((r, index) => {
        const name = normalize(r.c[0], "App");
        const description = normalize(r.c[1], "");
        const icon = normalize(r.c[2], "");
        const version = normalize(r.c[3], "");
        const platform = normalize(r.c[4], "");
        const downloadUrl = normalize(r.c[5], "");
        const smartLink = normalize(r.c[6], "");
        const features = normalize(r.c[7], "");
        const categoryRaw = normalize(r.c[8], "");
        const category = inferCategory(categoryRaw, features);
        const categoryIcon = getCategoryIcon(category);
        const safeIcon = isLikelyImageUrl(icon) ? icon : "";

        return {
          id: index + 1,
          name,
          description,
          icon: safeIcon,
          version,
          platform,
          downloadUrl,
          smartLink,
          features,
          category,
          categoryIcon,
          displayIcon: safeIcon || categoryIcon
        };
      }).filter(a => a.name.trim() !== "");
    }

    function bindHorizontalWheel() {
      const strip = document.getElementById("category-strip");
      strip.addEventListener("wheel", (e) => {
        if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
          strip.scrollLeft += e.deltaY;
          e.preventDefault();
        }
      }, { passive: false });
    }

    function setupImageFallbacks() {
      const imgs = document.querySelectorAll("img[data-fallback]");
      imgs.forEach(img => {
        img.addEventListener("error", () => {
          if (img.dataset.fallbackTried === "1") {
            img.style.display = "none";
            return;
          }
          img.dataset.fallbackTried = "1";
          const fallback = img.getAttribute("data-fallback") || "";
          if (fallback && img.src !== fallback) {
            img.src = fallback;
          } else {
            img.style.display = "none";
          }
        });
      });
    }

    function getCategories() {
      return [...CATEGORY_ORDER];
    }

    function renderCategoryStrip() {
      const strip = document.getElementById("category-strip");
      const categories = getCategories();

      if (!categories.length) {
        strip.style.display = "none";
        return;
      }

      strip.innerHTML = categories.map(cat => {
        const thumb = getCategoryIcon(cat === "All" ? "Apps" : cat);
        return `
        <button class="cat-btn ${cat === activeCategory ? "active" : ""}" data-category="${escapeHtml(cat)}">
          <img class="cat-thumb" src="${escapeHtml(thumb)}" alt="${escapeHtml(cat)}" data-fallback="${escapeHtml(CATEGORY_ICON_MAP.Apps)}" />
          <span class="cat-label">${escapeHtml(cat)}</span>
        </button>
      `;
      }).join("");

      strip.style.display = "flex";

      strip.querySelectorAll(".cat-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          activeCategory = btn.dataset.category || "All";
          renderFiltered();
        });
      });
    }

    function cardHtml(app) {
      const metaParts = [app.category, app.version ? `v${app.version}` : "", app.platform]
        .filter(Boolean)
        .join(" · ");

      return `
        <a class="app-row" href="./dl.html?id=${app.id}">
          <img class="mini-icon" src="${escapeHtml(app.displayIcon)}" alt="${escapeHtml(app.name)}" data-fallback="${escapeHtml(app.categoryIcon)}" />
          <div class="app-copy">
            <div class="title">${escapeHtml(app.name)}</div>
            <div class="desc">${escapeHtml(app.description || "No description")}</div>
            <div class="meta">${escapeHtml(metaParts)}</div>
          </div>
          <div class="go">›</div>
        </a>
      `;
    }

    function renderFiltered() {
      const q = document.getElementById("search").value.trim().toLowerCase();

      const filtered = apps.filter(a => {
        const categoryOk = activeCategory === "All" || a.category === activeCategory;
        const textOk = !q ||
          a.name.toLowerCase().includes(q) ||
          a.description.toLowerCase().includes(q) ||
          a.features.toLowerCase().includes(q) ||
          a.category.toLowerCase().includes(q);

        return categoryOk && textOk;
      });

      const status = document.getElementById("status");
      const wrap = document.getElementById("result-wrap");
      const listEl = document.getElementById("app-list");

      if (!filtered.length) {
        listEl.innerHTML = "";
        wrap.style.display = "none";
        status.style.display = "block";
        status.textContent = "No apps found for this category/search.";
      } else {
        listEl.innerHTML = filtered.map(cardHtml).join("");

        status.style.display = "none";
        wrap.style.display = "block";
        document.getElementById("section-title").textContent = activeCategory === "All" ? "All Apps" : `${activeCategory} Apps`;
        document.getElementById("result-count").textContent = `${filtered.length} app${filtered.length > 1 ? "s" : ""}`;
      }

      renderCategoryStrip();
      setupImageFallbacks();
    }

    function setupSearch() {
      const input = document.getElementById("search");
      input.addEventListener("input", renderFiltered);
    }

    (async function init() {
      try {
        bindHorizontalWheel();
        apps = await fetchApps();
        setupSearch();
        renderFiltered();
      } catch (err) {
        const status = document.getElementById("status");
        status.style.display = "block";
        status.textContent = "Error loading data. Open config.js and set your Google Sheet ID.";
        console.error(err);
      }
    })();
  </script>
</body>
</html>
