<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GridX Core</title>
  <meta name="description" content="GridX Core — desktop premium app showcase UI." />
  <meta name="theme-color" content="#1A1B35" />
  <link rel="icon" type="image/png" href="https://i.ibb.co.com/HfXybd5L/Gemini-Generated-Image-bje8lbbje8lbbje8-removebg-preview-1.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #eef3f6;
      --panel: #f6f9fb;
      --surface: #ffffff;
      --ink: #1A1B35;
      --muted: #566078;
      --line: #1A1B35;
      --green: #42be8a;
      --blue: #2d9cdb;
      --orange: #f5a623;
      --purple: #8e44dc;
      --red: #eb3b3b;
      --exe: #19b9a7;
      --shadow: 0 10px 24px rgba(24, 35, 60, .10);
      --radius-card: 16px;
      --radius-main: 24px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Manrope', sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #edf2f6 0%, #eef3f6 100%);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      width: min(1320px, calc(100% - 28px));
      margin: 18px auto;
      background: #f9fbfc;
      border-radius: 22px;
      box-shadow: 0 2px 0 rgba(255,255,255,.8) inset;
    }

    .topbar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--ink);
      font-weight: 800;
      letter-spacing: -0.02em;
      font-size: 30px;
      line-height: 1;
    }

    .brand img {
      width: 36px;
      height: 36px;
      object-fit: contain;
      border-radius: 10px;
    }

    .brand span em {
      color: #21c3b0;
      font-style: normal;
    }

    .search-wrap {
      display: flex;
      justify-content: center;
    }

    .search {
      width: min(100%, 390px);
      border: 1px solid #dde4ec;
      background: #fff;
      border-radius: 999px;
      height: 42px;
      padding: 0 16px;
      outline: none;
      font-size: 15px;
      font-weight: 600;
      color: var(--ink);
      box-shadow: 0 2px 8px rgba(30, 40, 70, .05);
    }

    .top-links {
      display: flex;
      align-items: center;
      gap: 28px;
      font-weight: 700;
      font-size: 21px;
    }

    .top-links a {
      text-decoration: none;
      color: #111;
    }

    .layout {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 14px;
      padding: 0 16px 14px;
    }

    .sidebar {
      padding: 10px 4px 0;
      font-size: 14px;
      color: #222;
    }

    .group { margin-bottom: 12px; }

    .group h3 {
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 7px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 5px 0;
      color: #2f3b52;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
    }

    .dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      border: 2px solid #d0d7e3;
      background: #fff;
      box-shadow: 0 0 0 1px #fff inset;
      flex-shrink: 0;
    }

    .dot.green { background: #3bc987; }
    .dot.blue { background: #2d9cdb; }
    .dot.purple { background: #8e44dc; }
    .dot.red { background: #eb3b3b; }
    .dot.orange { background: #f5a623; }
    .dot.exe { background: var(--exe); }
    .dot.active { border-color: #28bfd3; }

    .main {
      background: #f5f8fb;
      border-radius: var(--radius-main);
      padding: 6px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .card {
      background: #fff;
      border-radius: var(--radius-card);
      overflow: hidden;
      box-shadow: var(--shadow);
      text-decoration: none;
      color: inherit;
      display: grid;
      min-height: 180px;
    }

    .card.tall {
      grid-row: span 2;
      min-height: 370px;
      align-content: start;
    }

    .card-head {
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .01em;
    }

    .card-body {
      padding: 10px;
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .title {
      font-size: clamp(18px, 1.35vw, 29px);
      font-weight: 900;
      line-height: 1.02;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      min-height: 64px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .thumb-wrap {
      border-radius: 13px;
      overflow: hidden;
      background: #e9eef5;
      aspect-ratio: 16/9;
      display: grid;
      place-items: center;
    }

    .thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: #26314b;
      font-size: 13px;
      font-weight: 700;
    }

    .stars {
      color: #f5b531;
      letter-spacing: 1px;
      font-size: 15px;
      line-height: 1;
      white-space: nowrap;
    }

    .button {
      border: none;
      border-radius: 999px;
      height: 40px;
      width: 120px;
      justify-self: center;
      background: linear-gradient(180deg, #2bc8d7 0%, #10a8bc 100%);
      color: #fff;
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.6), 0 5px 10px rgba(20, 144, 157, .28);
    }

    .text-muted {
      color: #344057;
      font-size: 13px;
      font-weight: 700;
    }

    .h-games { background: var(--green); }
    .h-apps { background: var(--blue); }
    .h-tools { background: var(--orange); }
    .h-wallpaper { background: var(--purple); }
    .h-video { background: var(--red); }
    .h-exe { background: var(--exe); }

    .footer {
      display: flex;
      justify-content: center;
      gap: 36px;
      color: #1f2a44;
      font-weight: 700;
      font-size: 14px;
      padding: 8px 0 16px;
    }

    .footer a { text-decoration: none; color: inherit; }

    .status {
      grid-column: 1 / -1;
      padding: 35px 12px;
      border-radius: 18px;
      border: 2px dashed #c8d3e0;
      text-align: center;
      font-weight: 700;
      color: #52607d;
      background: #fff;
    }

    @media (max-width: 1280px) {
      .top-links { font-size: 17px; gap: 16px; }
      .grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }

    @media (max-width: 980px) {
      .topbar { grid-template-columns: 1fr; gap: 8px; }
      .layout { grid-template-columns: 1fr; }
      .sidebar { order: 2; }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .brand { font-size: 26px; }
      .top-links { justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <a class="brand" href="index.html" aria-label="GridX Core home">
        <img src="https://i.ibb.co.com/HfXybd5L/Gemini-Generated-Image-bje8lbbje8lbbje8-removebg-preview-1.png" alt="GridX Core" />
        <span>GRID<em>X</em>&nbsp;CORE</span>
      </a>

      <div class="search-wrap">
        <input id="search" class="search" placeholder="Search Games, Apps, Tools, EXE, or More..." />
      </div>

      <nav class="top-links" aria-label="Top links">
        <a href="#">Explore</a>
        <a href="#">My Library</a>
        <a href="#">Sign In</a>
      </nav>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <div class="group">
          <h3>Trending Categories</h3>
          <div class="item" data-filter="Games"><span class="dot green"></span>Games</div>
          <div class="item" data-filter="Apps"><span class="dot blue"></span>Apps</div>
          <div class="item" data-filter="EXE"><span class="dot exe"></span>EXE</div>
          <div class="item" data-filter="Wallpaper"><span class="dot purple"></span>Wallpaper</div>
        </div>

        <div class="group">
          <h3>Featured Creators</h3>
          <div class="item"><span class="dot green"></span>Games</div>
          <div class="item"><span class="dot blue"></span>Apps</div>
          <div class="item"><span class="dot red"></span>Video</div>
        </div>

        <div class="group">
          <h3>Featured Creators</h3>
          <div class="item"><span class="dot"></span>Games</div>
          <div class="item"><span class="dot"></span>Creatiest</div>
          <div class="item"><span class="dot purple"></span>Wallpaper</div>
          <div class="item"><span class="dot red"></span>Others</div>
        </div>

        <div class="group" id="filters">
          <h3>Filters</h3>
          <div class="item" data-filter="All"><span class="dot active"></span>All</div>
          <div class="item" data-filter="Games"><span class="dot"></span>Games</div>
          <div class="item" data-filter="Apps"><span class="dot"></span>Apps</div>
          <div class="item" data-filter="Tools"><span class="dot"></span>Tools</div>
          <div class="item" data-filter="EXE"><span class="dot exe"></span>EXE</div>
          <div class="item" data-filter="Wallpaper"><span class="dot"></span>Wallpaper</div>
          <div class="item" data-filter="Video"><span class="dot"></span>Video</div>
        </div>
      </aside>

      <main class="main">
        <section id="grid" class="grid" aria-label="App grid">
          <div id="status" class="status">Loading GridX Core content...</div>
        </section>
      </main>
    </div>

    <footer class="footer">
      <a href="#">About</a>
      <a href="#">Community</a>
      <a href="#">Contact</a>
      <a href="#">Privacy</a>
    </footer>
  </div>

  <script src="./config.js"></script>
  <script>
    const BRAND = window.APP_CONFIG?.BRAND || "GridX Core";
    const SHEET_ID = window.APP_CONFIG?.SHEET_ID || "";
    const SHEET_TAB = window.APP_CONFIG?.SHEET_TAB || "পত্রক1";

    document.title = BRAND;

    let apps = [];
    let activeFilter = "All";

    function parseGvizJson(text) {
      const match = text.match(/google\.visualization\.Query\.setResponse\((.*)\);?\s*$/s);
      if (match && match[1]) return JSON.parse(match[1]);
      return JSON.parse(text.substring(47).slice(0, -2));
    }

    function normalize(cell, fallback = "") {
      if (!cell) return fallback;
      if (cell.f != null) return String(cell.f);
      if (cell.v != null) return String(cell.v);
      return fallback;
    }

    function escapeHtml(str = "") {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function isLikelyImageUrl(url = "") {
      return /\.(png|jpe?g|webp|gif|svg|avif)(\?|#|$)/i.test(String(url).trim());
    }

    function visualCategory(rawCategory = "", features = "", name = "", description = "", downloadUrl = "") {
      const text = `${rawCategory} ${features} ${name} ${description} ${downloadUrl}`.toLowerCase();
      if (/\bexe\b|\.exe(\?|$)|windows|pc\s?game|desktop/.test(text)) return "EXE";
      if (/wallpaper|theme|background/.test(text)) return "Wallpaper";
      if (/video|media|movie|stream|player|youtube|netflix|audio/.test(text)) return "Video";
      if (/emulator|ppsspp|psp|ps2|retro|nintendo|dolphin|bios|tool|utility/.test(text)) return "Tools";
      if (/action|game|fps|battle|racing|pvp|shooter|adventure|arcade/.test(text)) return "Games";
      return "Apps";
    }

    function headClass(category) {
      if (category === "Games") return "h-games";
      if (category === "Tools") return "h-tools";
      if (category === "EXE") return "h-exe";
      if (category === "Wallpaper") return "h-wallpaper";
      if (category === "Video") return "h-video";
      return "h-apps";
    }

    function fallbackThumb(app) {
      const label = (app.name || "App").trim().charAt(0).toUpperCase() || "A";
      const color =
        app.vCategory === "Games" ? "#42be8a" :
        app.vCategory === "Tools" ? "#f5a623" :
        app.vCategory === "EXE" ? "#19b9a7" :
        app.vCategory === "Wallpaper" ? "#8e44dc" :
        app.vCategory === "Video" ? "#eb3b3b" : "#2d9cdb";

      const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='500' height='281'>
        <defs>
          <linearGradient id='g' x1='0' y1='0' x2='1' y2='1'>
            <stop stop-color='${color}' offset='0'/>
            <stop stop-color='#1A1B35' offset='1'/>
          </linearGradient>
        </defs>
        <rect width='100%' height='100%' fill='url(#g)'/>
        <circle cx='78' cy='78' r='44' fill='#fff' fill-opacity='.2'/>
        <text x='50%' y='56%' text-anchor='middle' font-family='Manrope,Arial' font-size='88' font-weight='800' fill='white'>${label}</text>
      </svg>`;

      return `data:image/svg+xml;utf8,${encodeURIComponent(svg)}`;
    }

    function starsFromName(name = "") {
      const n = name.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
      const full = 3 + (n % 3);
      return "★".repeat(full) + "☆".repeat(5 - full);
    }

    function numberFromName(name = "", max = 99) {
      const n = name.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
      return 1 + (n % max);
    }

    async function fetchApps() {
      if (!SHEET_ID) throw new Error("Missing SHEET_ID in config.js");

      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(SHEET_TAB)}&tqx=out:json`;
      const res = await fetch(url);
      const text = await res.text();
      const json = parseGvizJson(text);

      const cols = json.table.cols || [];
      const colMap = {};
      cols.forEach((c, i) => {
        const key = String(c?.label || c?.id || "").trim().toLowerCase();
        if (key) colMap[key] = i;
      });

      const getIdx = (...keys) => {
        for (const key of keys) {
          const k = key.toLowerCase();
          if (Object.prototype.hasOwnProperty.call(colMap, k)) return colMap[k];
        }
        return -1;
      };

      const IDX = {
        name: getIdx("name"),
        description: getIdx("description"),
        icon: getIdx("icon"),
        version: getIdx("version"),
        platform: getIdx("platform"),
        downloadUrl: getIdx("downloadurl", "download url", "download"),
        features: getIdx("features"),
        category: getIdx("category")
      };

      const rows = json.table.rows || [];

      return rows
        .map((row, rowIndex) => {
          const read = (idx, fallback = "") => idx >= 0 ? normalize(row.c?.[idx], fallback) : fallback;

          const name = read(IDX.name, "").trim();
          const description = read(IDX.description, "").trim();
          const features = read(IDX.features, "").trim();
          const category = read(IDX.category, "").trim();
          const icon = read(IDX.icon, "").trim();
          const safeIcon = isLikelyImageUrl(icon) ? icon : "";

          return {
            id: rowIndex + 1,
            name,
            description,
            icon: safeIcon,
            version: read(IDX.version, "").trim(),
            platform: read(IDX.platform, "").trim(),
            downloadUrl: read(IDX.downloadUrl, "").trim(),
            features,
            category,
            vCategory: visualCategory(category, features, name, description, read(IDX.downloadUrl, "").trim())
          };
        })
        .filter(app => app.name);
    }

    function renderGrid() {
      const search = (document.getElementById('search').value || '').trim().toLowerCase();
      const grid = document.getElementById('grid');

      const filtered = apps.filter(app => {
        const inFilter = activeFilter === 'All' || app.vCategory === activeFilter;
        const text = `${app.name} ${app.description} ${app.features} ${app.platform} ${app.category} ${app.vCategory}`.toLowerCase();
        const inSearch = !search || text.includes(search);
        return inFilter && inSearch;
      });

      if (!filtered.length) {
        grid.innerHTML = `<div class='status'>No matching apps found.</div>`;
        return;
      }

      grid.innerHTML = filtered.map((app, idx) => {
        const thumb = app.icon || fallbackThumb(app);
        const tall = idx % 7 === 0 || idx % 11 === 3;
        const rating = starsFromName(app.name);
        const miniCount = numberFromName(app.name, 43);
        const head = escapeHtml(app.vCategory);
        const title = escapeHtml(app.name);
        const desc = escapeHtml(app.description || 'Premium ready build.');

        return `
          <a class="card ${tall ? 'tall' : ''}" href="./dl.html?id=${app.id}">
            <div class="card-head ${headClass(app.vCategory)}">
              <span>${head}</span>
              <span>${app.vCategory === 'Video' ? '▶' : app.vCategory === 'Wallpaper' ? '🖼' : app.vCategory === 'Tools' ? '🛠' : app.vCategory === 'EXE' ? '💻' : app.vCategory === 'Games' ? '🎮' : '▦'}</span>
            </div>
            <div class="card-body">
              <div class="title">${title}</div>
              <div class="thumb-wrap">
                <img class="thumb" src="${escapeHtml(thumb)}" alt="${title}" loading="lazy" />
              </div>
              <div class="meta">
                <span class="text-muted">${escapeHtml(app.platform || 'Android')}</span>
                <span class="stars">${rating}</span>
              </div>
              ${tall ? `<div class="text-muted" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:36px;">${desc}</div>` : ''}
              <div class="meta">
                <span>${miniCount} ${app.vCategory === 'Video' ? 'Plays' : 'Downloads'}</span>
                ${app.version ? `<span>v${escapeHtml(app.version)}</span>` : `<span>${escapeHtml(app.vCategory)}</span>`}
              </div>
              <button class="button" type="button">${app.vCategory === 'Video' ? 'PLAY' : '▶'}</button>
            </div>
          </a>
        `;
      }).join('');
    }

    function setupFilterClicks() {
      const filterWrap = document.getElementById('filters');
      filterWrap.querySelectorAll('.item[data-filter]').forEach(item => {
        item.addEventListener('click', () => {
          activeFilter = item.getAttribute('data-filter') || 'All';
          filterWrap.querySelectorAll('.dot').forEach(dot => dot.classList.remove('active'));
          const dot = item.querySelector('.dot');
          if (dot) dot.classList.add('active');
          renderGrid();
        });
      });

      document.querySelectorAll('.sidebar .group .item[data-filter]').forEach(item => {
        item.addEventListener('click', () => {
          const filter = item.getAttribute('data-filter');
          if (!filter) return;
          activeFilter = filter;
          filterWrap.querySelectorAll('.item').forEach(flItem => {
            const d = flItem.querySelector('.dot');
            if (d) d.classList.remove('active');
            if (flItem.getAttribute('data-filter') === filter && d) d.classList.add('active');
          });
          renderGrid();
        });
      });
    }

    document.getElementById('search').addEventListener('input', renderGrid);

    (async function init() {
      try {
        apps = await fetchApps();
        setupFilterClicks();
        renderGrid();
      } catch (error) {
        const grid = document.getElementById('grid');
        grid.innerHTML = `<div class='status'>Could not load Google Sheet data. Verify SHEET_ID, SHEET_TAB, and sheet visibility.</div>`;
        console.error(error);
      }
    })();
  </script>
</body>
</html>
